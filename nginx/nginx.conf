events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name attendify.tech api.attendify.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Frontend — attendify.tech
    server {
        listen 443 ssl;
        server_name attendify.tech;

        ssl_certificate     /etc/letsencrypt/live/attendify.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/attendify.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://ams_frontend:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # API — api.attendify.tech
    server {
        listen 443 ssl;
        server_name api.attendify.tech;

        ssl_certificate     /etc/letsencrypt/live/attendify.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/attendify.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # WebSocket — camera and dashboard streams
        location /ws/ {
            proxy_pass             http://ams_backend:8000;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_read_timeout     86400;
        }

        location / {
            proxy_pass           http://ams_backend:8000;
            proxy_set_header     Host $host;
            proxy_set_header     X-Real-IP $remote_addr;
            proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header     X-Forwarded-Proto $scheme;
            client_max_body_size 20M;
        }
    }
}
