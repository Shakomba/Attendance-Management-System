# Local development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Adds direct port access and hot-reload for backend code.
# nginx is not started (no SSL certs locally).
services:
  backend:
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "5173:80"

  nginx:
    profiles: ["production"]

  sqlserver:
    ports:
      - "1433:1433"
